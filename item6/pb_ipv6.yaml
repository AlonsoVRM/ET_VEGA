---
- name: Aprovisionar direccionamiento IPv6
  hosts: routers
  gather_facts: false

  tasks:
    - name: Crear Loopback 33 y configurar IPv6
      ios_config:
        parents: interface Loopback33
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
